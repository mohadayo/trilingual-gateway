name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ワークフロー・同一 ref (PR ブランチや main) で新しいジョブが起動したら、
# 進行中の古いジョブをキャンセルする。PR に短時間で連続 push した場合の
# 実行枠・実行時間の無駄を削減する。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/analytics-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            services/analytics-py/requirements.txt
            services/analytics-py/requirements-dev.txt
      # テスト依存 (pytest / flake8) は requirements-dev.txt 側にまとまっている。
      # dev ファイル自身が "-r requirements.txt" を先頭に含むため 1 コマンドで完結する。
      - run: pip install -r requirements-dev.txt
      - run: flake8 --max-line-length=120 --exclude=__pycache__ .
      - run: pytest -v

  test-go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/processor-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          # processor-go は標準ライブラリのみで go.sum を持たないため、
          # cache-dependency-path は go.mod を指す（setup-go v5 は go.mod でもハッシュを取れる）
          cache-dependency-path: services/processor-go/go.mod
      - run: go vet ./...
      - run: go test -v ./...

  test-typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/usermgmt-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: services/usermgmt-ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-python, test-go, test-typescript]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
